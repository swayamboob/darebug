name: pull-request.yaml
on:
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Build & Run Tests
        run: mvn clean verify
